---
- name: Converge
  hosts: all
  become: true
  vars:
    # Docker Desktop exposes all host CPUs but far less RAM; the yosys
    # dependency build gets OOM-killed at full width (rc 137). Real hosts
    # keep the vCPU-count default.
    eda_make_jobs: 4
  roles:
    # Meta-dependencies pull in yosys and eda_common first.
    - role: icanalytica.eda.sby
