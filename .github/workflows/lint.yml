---
name: Lint

on:  # yamllint disable-line rule:truthy
  push:
  pull_request:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.8"

      - name: Sync uv project
        run: uv sync --frozen

      - name: Run ansible-lint
        env:
          ANSIBLE_NOCOWS: "1"
        run: uv run ansible-lint -p

      - name: Run yamllint
        run: uv run yamllint .

      - name: Collection build sanity
        run: uv run ansible-galaxy collection build --force
