---
- name: Ensure yosys build root exists
  ansible.builtin.file:
    path: "{{ yosys_build_root }}"
    state: directory
    mode: "0755"
  become: true

- name: Stage yosys tarball from controller
  ansible.builtin.copy:
    src: "{{ yosys_source_url | urlsplit('path') }}"
    dest: "{{ yosys_source_archive }}"
    mode: "0644"
    force: false
  when:
    - (yosys_source_url | urlsplit('scheme') | lower) == 'file'
  become: true

- name: Download yosys source tarball
  ansible.builtin.get_url:
    url: "{{ yosys_source_url }}"
    dest: "{{ yosys_source_archive }}"
    mode: "0644"
    checksum: "{{ yosys_checksum }}"
  when:
    - (yosys_source_url | urlsplit('scheme') | lower) != 'file'
  become: true

- name: Check yosys install stamp
  ansible.builtin.stat:
    path: "{{ yosys_install_stamp }}"
  register: yosys_stamp_stat
  become: true

- name: Determine if yosys build is needed
  ansible.builtin.set_fact:
    yosys_build_needed: >-
      {{ (not yosys_stamp_stat.stat.exists) or (yosys_force_rebuild | bool) }}

- name: Remove previous yosys extraction
  ansible.builtin.command: "rm -rf {{ yosys_source_dir }}"
  args:
    removes: "{{ yosys_source_dir }}"
  when: yosys_build_needed | bool
  become: true

# The release src tarball is flat (no top-level directory), so create the
# source dir first and extract into it.
- name: Create yosys source directory
  ansible.builtin.file:
    path: "{{ yosys_source_dir }}"
    state: directory
    mode: "0755"
  when: yosys_build_needed | bool
  become: true

- name: Extract yosys source
  ansible.builtin.unarchive:
    src: "{{ yosys_source_archive }}"
    dest: "{{ yosys_source_dir }}"
    remote_src: true
    creates: "{{ yosys_source_dir }}/Makefile"
  when: yosys_build_needed | bool
  become: true

- name: Build yosys (includes bundled ABC)
  ansible.builtin.command: >-
    make -j {{ yosys_make_jobs }} {{ yosys_make_args | join(' ') }}
  args:
    chdir: "{{ yosys_source_dir }}"
    creates: "{{ yosys_source_dir }}/yosys"
  when: yosys_build_needed | bool
  become: true

- name: Clear yosys install stamp before reinstall
  ansible.builtin.file:
    path: "{{ yosys_install_stamp }}"
    state: absent
  when: yosys_build_needed | bool
  become: true

- name: Install yosys
  ansible.builtin.command:
    cmd: "make install {{ yosys_make_args | join(' ') }}"
    chdir: "{{ yosys_source_dir }}"
  args:
    creates: "{{ yosys_install_stamp }}"
  when: yosys_build_needed | bool
  become: true

- name: Record yosys install stamp
  ansible.builtin.copy:
    content: "{{ yosys_version }}\n"
    dest: "{{ yosys_install_stamp }}"
    mode: "0644"
    force: false
  when: yosys_build_needed | bool
  become: true
