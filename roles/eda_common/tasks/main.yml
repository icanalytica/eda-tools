---
- name: Ensure supported OS family
  ansible.builtin.assert:
    that:
      - ansible_facts['os_family'] in ['RedHat', 'Darwin']
    fail_msg: >-
      icanalytica.eda supports RedHat-family Linux and macOS.
      Detected: {{ ansible_facts['os_family'] }}.

- name: Include OS family vars
  ansible.builtin.include_vars: "{{ ansible_facts['os_family'] | lower }}.yml"

- name: Include OS family setup
  ansible.builtin.include_tasks: "{{ ansible_facts['os_family'] | lower }}.yml"

- name: Create EDA prefix directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ eda_prefix }}"
    - "{{ eda_prefix }}/bin"
    - "{{ eda_vendor_prefix }}"
    - "{{ eda_src_root }}"
  become: true
